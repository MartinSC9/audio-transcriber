<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Transcriber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #666;
      background: #111;
    }

    .drop-zone.has-file {
      border-color: #3b82f6;
      background: #0c1929;
    }

    .drop-zone svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      color: #555;
    }

    .drop-zone p { color: #888; font-size: 0.9rem; }
    .drop-zone .file-name { color: #3b82f6; font-weight: 500; margin-top: 0.5rem; }

    .file-input { display: none; }

    .options {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .options label { color: #888; font-size: 0.85rem; }

    .options select {
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: #3b82f6;
      color: #fff;
    }

    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #1e3a5f; color: #5a8ac4; cursor: not-allowed; }

    .result {
      margin-top: 2rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .result-header h2 { font-size: 1.1rem; font-weight: 500; }

    .meta {
      color: #888;
      font-size: 0.8rem;
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .copy-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .copy-btn:hover { background: #333; }

    .text-output {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1.25rem;
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    .error {
      background: #1c0b0b;
      border: 1px solid #5c1a1a;
      color: #f87171;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      display: none;
    }

    .error.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #5a8ac4;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Audio Transcriber</h1>
    <p class="subtitle">Subi un archivo de audio y obtene la transcripcion en texto.</p>

    <div class="drop-zone" id="dropZone">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
      </svg>
      <p>Arrastra tu audio aca o <strong>hace click</strong> para seleccionar</p>
      <p style="margin-top: 0.5rem; font-size: 0.8rem;">MP3, WAV, M4A, OGG, FLAC, WebM (max 25MB)</p>
      <p class="file-name" id="fileName"></p>
    </div>

    <input type="file" class="file-input" id="fileInput" accept=".mp3,.wav,.m4a,.mp4,.webm,.ogg,.flac,.oga,audio/*">

    <div class="options">
      <label>Idioma:</label>
      <select id="language">
        <option value="">Auto-detectar</option>
        <option value="es">Espanol</option>
        <option value="en">Ingles</option>
        <option value="pt">Portugues</option>
        <option value="fr">Frances</option>
        <option value="de">Aleman</option>
        <option value="it">Italiano</option>
        <option value="ja">Japones</option>
        <option value="zh">Chino</option>
      </select>
    </div>

    <button class="btn" id="transcribeBtn" disabled>Transcribir</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-header">
        <h2>Transcripcion</h2>
        <button class="copy-btn" id="copyBtn">Copiar texto</button>
      </div>
      <div class="meta" id="meta"></div>
      <div class="text-output" id="textOutput"></div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const transcribeBtn = document.getElementById("transcribeBtn");
    const result = document.getElementById("result");
    const textOutput = document.getElementById("textOutput");
    const meta = document.getElementById("meta");
    const errorDiv = document.getElementById("error");
    const copyBtn = document.getElementById("copyBtn");
    const language = document.getElementById("language");

    let selectedFile = null;

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      dropZone.classList.add("has-file");
      transcribeBtn.disabled = false;
      result.classList.remove("visible");
      errorDiv.classList.remove("visible");
    }

    transcribeBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      transcribeBtn.disabled = true;
      transcribeBtn.innerHTML = '<span class="spinner"></span>Transcribiendo...';
      errorDiv.classList.remove("visible");
      result.classList.remove("visible");

      const formData = new FormData();
      formData.append("audio", selectedFile);
      if (language.value) formData.append("language", language.value);

      try {
        const res = await fetch("/transcribe", { method: "POST", body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Error desconocido");

        textOutput.textContent = data.text;

        const parts = [];
        if (data.language) parts.push(`Idioma: ${data.language}`);
        if (data.duration) parts.push(`Duracion: ${Math.round(data.duration)}s`);
        meta.textContent = parts.join(" | ");

        result.classList.add("visible");
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.add("visible");
      } finally {
        transcribeBtn.disabled = false;
        transcribeBtn.textContent = "Transcribir";
      }
    });

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(textOutput.textContent);
      copyBtn.textContent = "Copiado!";
      setTimeout(() => (copyBtn.textContent = "Copiar texto"), 2000);
    });
  </script>
</body>
</html>
